# Ruff configuration — minimal, opinionated.
# Start permissive on style, strict on real bugs. Tighten later.

line-length = 100
target-version = "py310"
extend-exclude = ["venv", ".venv", "__pycache__", "readme_images"]

[lint]
# E/W = pycodestyle, F = pyflakes (real bugs), I = isort
select = ["E", "F", "W", "I"]
# E501: line length handled by formatter; allow occasional long lines.
# I001: import sorting is noisy on an existing codebase; enable when you're ready.
ignore = ["E501", "I001"]

[lint.per-file-ignores]
# TODO: remove once `shlex` is dropped from app.py imports.
"app.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
