name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run catches CVEs in dependencies even when the codebase is quiet.
    - cron: "23 6 * * 1"

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # security-extended: real security findings only.
          # `quality` queries are skipped on purpose — ruff already catches
          # style issues like unused imports, so CodeQL stays focused on CVEs.
          queries: security-extended

      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
