name: Smoke test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-and-import:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install system deps for opencv
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt

      - name: Compile-check all sources
        run: python -m compileall -q pipeline.py app.py

      - name: Runtime-import pipeline
        run: python -c "import pipeline; print('pipeline OK', pipeline.DEFAULT_MODEL)"
