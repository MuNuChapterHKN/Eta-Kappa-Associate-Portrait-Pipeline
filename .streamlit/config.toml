[server]
headless = true
runOnSave = false
maxUploadSize = 500
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true

[theme]
base = "dark"
primaryColor = "#D4A24C"
backgroundColor = "#0C0E12"
secondaryBackgroundColor = "#14171D"
textColor = "#ECE4D2"
font = "serif"
